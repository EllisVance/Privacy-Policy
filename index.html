<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tab Oscillating Blocker</title>
    <meta
      name="description"
      content="Tab Oscillating Blocker is a local-first Chrome extension that reduces rapid tab switching with a calm breathing reset."
    >
    <style>
      :root {
        color-scheme: dark;
        --bg: #101314;
        --text: #edf7f2;
        --muted: #9badad;
        --accent: #86efac;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background: radial-gradient(circle at 50% 35%, rgba(134, 239, 172, 0.16), transparent 34rem), var(--bg);
        color: var(--text);
        font: 16px/1.6 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(720px, calc(100% - 32px));
      }

      h1 {
        margin: 0 0 14px;
        font-size: clamp(38px, 8vw, 76px);
        line-height: 1.02;
        letter-spacing: 0;
      }

      p {
        max-width: 46em;
        margin: 0 0 24px;
        color: var(--muted);
      }

      a {
        color: var(--accent);
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Tab Oscillating Blocker</h1>
      <p>
        A local-first Chrome extension that detects rapid tab switching and opens
        a calm breathing reset before attention fragments.
      </p>
      <a href="./privacy-policy.html">Privacy Policy</a>
    </main>
  </body>
</html>
